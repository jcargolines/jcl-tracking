<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JCL Live Tracking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
#header{background:#1e293b;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155;flex-shrink:0}
#header h1{font-size:15px;font-weight:600}
#header span{font-size:12px;color:#94a3b8;margin-left:auto}
#map{flex:1}
#list{background:#1e293b;border-top:1px solid #334155;max-height:160px;overflow-y:auto;flex-shrink:0}
.driver-card{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #0f172a;cursor:pointer}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.active{background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite}
.dot.inactive{background:#64748b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.driver-name{font-size:13px;font-weight:600}
.driver-sub{font-size:11px;color:#94a3b8}
#status{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;color:#64748b;text-align:center;padding:2rem}
#status h2{font-size:18px}
</style>
</head>
<body>
<div id="header">
  <div style="width:32px;height:32px;background:#3b82f6;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px">🚚</div>
  <h1>JCL Live Tracking</h1>
  <span id="last-update">Laden...</span>
</div>
<div id="status">
  <div style="font-size:48px">🔄</div>
  <h2>Verbinden...</h2>
  <p>Even geduld</p>
</div>
<div id="map" style="display:none;flex:1"></div>
<div id="list" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const params=new URLSearchParams(location.search);
const token=params.get('token')||'';
const firebaseUrl=(params.get('db')||'').replace(/\/$/,'');

function showStatus(icon,title,sub,color){
  document.getElementById('status').style.display='flex';
  document.getElementById('map').style.display='none';
  document.getElementById('list').style.display='none';
  document.getElementById('status').innerHTML='<div style="font-size:48px">'+icon+'</div>'
    +'<h2 style="color:'+(color||'#94a3b8')+'">'+title+'</h2>'
    +(sub?'<p style="color:#64748b;font-size:14px">'+sub+'</p>':'');
}

if(!firebaseUrl||!token){
  showStatus('🔒','Geen toegang','Ongeldige link','#ef4444');
} else {
  verifyToken();
}

var map=null, marker=null, driverUid=null, tokenData=null;

async function verifyToken(){
  try{
    const r=await fetch(firebaseUrl+'/tokens/'+token+'.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.json();
    if(!t){showStatus('❌','Link niet gevonden','Deze tracking link bestaat niet.','#ef4444');return;}
    if(t.active===false){showStatus('🔒','Toegang ingetrokken','Deze tracking link is niet meer geldig. Neem contact op met JCL.','#f59e0b');return;}
    tokenData=t;
    driverUid=t.driverUid;
    document.getElementById('status').style.display='none';
    document.getElementById('map').style.display='block';
    document.getElementById('list').style.display='block';
    initMap();
    fetchLocation();
    setInterval(fetchLocation,10000);
    // SSE
    try{
      const sse=new EventSource(firebaseUrl+'/locaties/'+driverUid+'.json?accept=text/event-stream');
      sse.addEventListener('put',function(e){try{const ev=JSON.parse(e.data);if(ev.data)updateDriver(ev.data);}catch(err){}});
    }catch(e){}
  }catch(e){
    showStatus('⚠️','Verbindingsfout',e.message,'#ef4444');
  }
}

function initMap(){
  map=L.map('map').setView([52.38,4.64],9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
}

async function fetchLocation(){
  if(!driverUid)return;
  try{
    // Also re-verify token is still active
    const tr=await fetch(firebaseUrl+'/tokens/'+token+'/active.json');
    if(tr.ok){const active=await tr.json();if(active===false){showStatus('🔒','Toegang ingetrokken','Deze tracking link is niet meer geldig.','#f59e0b');return;}}
    const r=await fetch(firebaseUrl+'/locaties/'+driverUid+'.json');
    if(r.ok){const d=await r.json();if(d)updateDriver(d);}
  }catch(e){}
  document.getElementById('last-update').textContent=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

var mapFitted=false;
function updateDriver(loc){
  if(!loc||!loc.lat||!loc.lng)return;
  const color=loc.actief?'#22c55e':'#64748b';
  const icon=L.divIcon({
    html:'<div style="background:'+color+';color:#fff;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)">'+(loc.voertuig?loc.voertuig.slice(0,5):'🚚')+'</div>',
    iconSize:[44,44],iconAnchor:[22,22],className:''
  });
  if(marker){marker.setLatLng([loc.lat,loc.lng]);marker.setIcon(icon);}
  else{marker=L.marker([loc.lat,loc.lng],{icon}).addTo(map).bindPopup('<strong>'+(loc.chauffeur||'Chauffeur')+'</strong><br>'+(loc.voertuig||'')+(loc.speed?'<br>⚡ '+loc.speed+' km/h':''));}
  if(!mapFitted){map.setView([loc.lat,loc.lng],13);mapFitted=true;}

  // Update list
  const ago=loc.ts?Math.round((Date.now()-loc.ts)/1000):null;
  const agoStr=ago===null?'—':ago<60?ago+'s geleden':Math.round(ago/60)+'min geleden';
  document.getElementById('list').innerHTML='<div class="driver-card" onclick="map.setView(marker.getLatLng(),15)">'
    +'<div class="dot '+(loc.actief?'active':'inactive')+'"></div>'
    +'<div style="flex:1"><div class="driver-name">'+(loc.chauffeur||'Chauffeur')+'</div>'
    +'<div class="driver-sub">'+(loc.voertuig||'—')+(loc.speed?' · '+loc.speed+' km/h':'')+'</div></div>'
    +'<div style="font-size:11px;color:#64748b">'+(loc.actief?'Actief':'Offline')+' · '+agoStr+'</div>'
    +'</div>';
}
</script>
</body>
</html>
